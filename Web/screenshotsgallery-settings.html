<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ScreenShots Gallery</title>
</head>
<body>
  <div id="configPage" data-role="page" class="page type-interior pluginConfigurationPage configPage" data-require="emby-input,emby-button">
    <div data-role="content">
      <div class="content-primary">
        <h1>ScreenShots Gallery</h1>
        <form class="configForm">
          <div class="inputContainer">
            <input is="emby-input" type="text" id="folderName" required label="Screenshot Folder" />
            <div class="fieldDescription">Use a folder like <strong>images</strong> or <strong>extrafanarts</strong>. The plugin will scan this folder beside each movie, episode, or series folder.</div>
          </div>
          <div class="inputContainer">
            <div id="status" class="fieldDescription"></div>
          </div>
          <br />
          <div>
            <button is="emby-button" type="submit" class="raised button-submit block"><span>Save</span></button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="/web/plugins/ScreenShotsGallery/screenshotsgallery-settings.js"></script>
</body>
</html>
